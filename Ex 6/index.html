<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulaire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="form-card">
      <h1>Formulaire d'inscription</h1>
      <p class="intro">
        Remplis les champs ci-dessous. Les erreurs s'affichent directement sous chaque champ.
      </p>

      <form id="signupForm" novalidate>
        <div class="field">
          <label for="name">Nom</label>
          <input id="name" name="name" type="text" placeholder="Votre nom">
          <p class="error-message" id="nameError"></p>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="nom@exemple.com">
          <p class="error-message" id="emailError"></p>
        </div>

        <div class="field">
          <label for="password">Mot de passe</label>
          <input id="password" name="password" type="password" placeholder="8 caracteres minimum">
          <p class="error-message" id="passwordError"></p>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirmation</label>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirmez le mot de passe">
          <p class="error-message" id="confirmPasswordError"></p>
        </div>

        <button type="submit">S'inscrire</button>
        <p class="success-message" id="successMessage"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
